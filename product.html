<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Товар — 777Angelskiii</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<canvas id="glitter-canvas"></canvas>

<nav>
  <a href="index.html" class="nav-logo">777Angelskiii</a>
  <ul class="nav-links">
    <li><a href="index.html">Головна</a></li>
    <li><a href="catalog.html">Каталог</a></li>
    <li><a href="index.html#socials">Контакти</a></li>
  </ul>
  <div class="nav-right">
    <a href="cart.html" class="cart-icon" title="Кошик">
      🛒
      <span class="cart-count" style="display:none">0</span>
    </a>
    <div class="burger"><span></span><span></span><span></span></div>
  </div>
</nav>

<div class="zoom-overlay" id="zoom-overlay" style="opacity:0;pointer-events:none;" onclick="if(event.target===this){this.style.opacity='0';this.style.pointerEvents='none';}">
  <button class="zoom-close" id="zoom-close" onclick="document.getElementById('zoom-overlay').style.opacity='0';document.getElementById('zoom-overlay').style.pointerEvents='none';">✕</button>
  <img id="zoom-img" src="" alt="zoom"/>
</div>

<div class="product-page" id="product-page">
  <!-- Rendered by JS -->
</div>

<!-- Related products -->
<section class="catalog-section" style="padding-top:0;">
  <div class="section-title" style="font-size:1.2rem;">Також може сподобатись</div>
  <div class="section-line"></div>
  <div class="products-grid" id="related-grid"></div>
</section>

<footer>
  <p>© 2026 777Angelskiii. All rights reserved. &nbsp;|&nbsp; <a href="https://instagram.com/777angelskiii" target="_blank">@777angelskiii</a></p>
</footer>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  const product = getProductById(productId);
  const page = document.getElementById('product-page');

  if (!product) {
    page.innerHTML = `<div class="cart-empty">Товар не знайдено. <a href="catalog.html" style="color:var(--accent)">Повернутись до каталогу</a></div>`;
  } else {
    document.title = `${product.name} — 777Angelskiii`;

    let selectedSize = product.sizes[0];
    let qty = 1;

    function buildThumbsHTML() {
      return product.images.map((img, i) =>
        `<img class="product-thumb ${i === 0 ? 'active' : ''}" src="${img}" alt="${product.name} ${i+1}" data-idx="${i}" onerror="this.style.background='#111120'">`
      ).join('');
    }

    function buildDetailsHTML() {
      return product.details.map(d =>
        `<li>${d.label} <span>${d.value}</span></li>`
      ).join('');
    }

    page.innerHTML = `
      <div style="margin-bottom:24px;">
        <a href="catalog.html" style="color:var(--gray);text-decoration:none;font-size:0.8rem;letter-spacing:2px;">← Каталог</a>
      </div>
      <div class="product-layout">
        <div class="product-gallery">
          <img class="product-main-img" id="main-img" src="${product.images[0] || ''}" alt="${product.name}" onclick="var o=document.getElementById('zoom-overlay'),z=document.getElementById('zoom-img');z.src=this.src;o.style.opacity='1';o.style.pointerEvents='all';" onerror="this.style.background='#111120'">
          <div class="product-thumbs" id="thumbs">${buildThumbsHTML()}</div>
        </div>
        <div class="product-info-panel">
          ${product.badge ? `<div style="display:inline-block;background:var(--accent);color:#000;font-size:0.65rem;font-weight:700;letter-spacing:2px;padding:4px 12px;margin-bottom:16px;">${product.badge}</div>` : ''}
          <h1 class="product-title">${product.name}</h1>
          <div class="product-price-big">
            ${product.price} ₴
            ${product.oldPrice ? `<span style="color:var(--gray);text-decoration:line-through;font-size:1.2rem;margin-left:12px;">${product.oldPrice} ₴</span>` : ''}
          </div>
          <p class="product-desc">${product.description}</p>

          <div class="size-label">Розмір</div>
          <div class="sizes" id="sizes-row">
            ${product.sizes.map(s =>
              `<button class="size-btn ${s === selectedSize ? 'active' : ''}" data-size="${s}">${s}</button>`
            ).join('')}
          </div>

          <div class="qty-row">
            <span class="qty-label">Кількість</span>
            <div class="qty-control">
              <button class="qty-btn" id="qty-minus">−</button>
              <div class="qty-num" id="qty-display">1</div>
              <button class="qty-btn" id="qty-plus">+</button>
            </div>
          </div>

          <button class="add-to-cart-btn" id="add-btn">✦ Додати до кошика</button>
          <a href="cart.html" style="display:block;text-align:center;color:var(--gray);font-size:0.8rem;letter-spacing:2px;text-decoration:none;margin-top:8px;transition:color 0.3s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--gray)'">Переглянути кошик →</a>

          <ul class="product-details-list">${buildDetailsHTML()}</ul>
        </div>
      </div>`;

    // Thumb click
    document.getElementById('thumbs').addEventListener('click', e => {
      const thumb = e.target.closest('.product-thumb');
      if (!thumb) return;
      document.querySelectorAll('.product-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
      document.getElementById('main-img').src = product.images[thumb.dataset.idx];
    });

    // Size select
    document.getElementById('sizes-row').addEventListener('click', e => {
      const btn = e.target.closest('.size-btn');
      if (!btn) return;
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedSize = btn.dataset.size;
    });

    // Qty
    document.getElementById('qty-minus').addEventListener('click', () => {
      if (qty > 1) { qty--; document.getElementById('qty-display').textContent = qty; }
    });
    document.getElementById('qty-plus').addEventListener('click', () => {
      qty++;
      document.getElementById('qty-display').textContent = qty;
    });

    // Add to cart
    document.getElementById('add-btn').addEventListener('click', () => {
      addToCart({
        id: product.id,
        name: product.name,
        price: product.price,
        size: selectedSize,
        qty: qty,
        image: product.images[0] || '',
      });
    });
  }

  // Related products
  const relatedGrid = document.getElementById('related-grid');  const related = PRODUCTS.filter(p => p.id !== productId).slice(0, 4);
  relatedGrid.innerHTML = related.map(p => `
    <a href="product.html?id=${p.id}" class="product-card">
      <div class="product-card-img-wrap">
        <img class="product-card-img" src="${p.images[0] || ''}" alt="${p.name}" onerror="this.style.background='#111120';this.style.minHeight='320px'">
        ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
      </div>
      <div class="product-card-info">
        <div class="product-card-name">${p.name}</div>
        <div class="product-card-price">${p.price} ₴</div>
      </div>
    </a>`).join('');
</script>
</body>
</html>
